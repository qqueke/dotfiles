colors.draw_bold_text_with_bright_colors = true

[window]
opacity = 0.85

[window.padding]
x = 5
y = 5

[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Bold"



[cursor.style]
shape = "Underline"
blinking = "On"

[general]

live_config_reload = true
import = [
    "~/.config/alacritty/alacritty-theme/themes/xterm.toml"
]
